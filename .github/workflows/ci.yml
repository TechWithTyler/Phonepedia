name: Swift

on:
  pull_request:
    branches: ["main", "main-SheftApps-Team-Internal"]

jobs:
  lint:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }} HEAD -- '*.swift' | tr '\n' ' ')
          echo "files=$CHANGED_FILES" >> $GITHUB_OUTPUT

      - name: Install linting tools
        run: brew install swiftlint

      - name: Lint
        run: |
          if [ -z "${{ steps.changed-files.outputs.files }}" ]; then
            echo "No Swift files changed, skipping lint"
          else
            swiftlint --strict ${{ steps.changed-files.outputs.files }}
          fi

  build-ios:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build SheftAppsStylishUI framework (iOS)
        run: |
          xcodebuild \
            -project ../SheftAppsStylishUI/SheftAppsStylishUI.xcodeproj \
            -scheme "SheftAppsStylishUI (2017, Framework 2022)" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: Phonepedia

      - name: Build iOS app
        run: |
          xcodebuild \
            -project Phonepedia.xcodeproj \
            -scheme "Phonepedia (2023)" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            build

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build SheftAppsStylishUI framework (macOS)
        run: |
          xcodebuild \
            -project ../SheftAppsStylishUI/SheftAppsStylishUI.xcodeproj \
            -scheme "SheftAppsStylishUI (2017, Framework 2022)" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build
        working-directory: Phonepedia

      - name: Build macOS app
        run: |
          xcodebuild \
            -project Phonepedia.xcodeproj \
            -scheme "Phonepedia (2023)" \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            ASSETCATALOG_COMPILER_APPICON_NAME="" \
            build
