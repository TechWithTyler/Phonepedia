name: CI (Build & Lint)

on:
  pull_request:
    paths:
      - "**/*.swift"
      - ".swiftlint.yml"
      - ".swiftformat*"
      - "**/*.xcodeproj/**"

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install swiftlint swiftformat xcpretty

      - name: Create SwiftLint config (if missing)
        run: |
          if [ ! -f .swiftlint.yml ]; then
            echo "Creating basic SwiftLint configuration..."
            cat > .swiftlint.yml << EOF
          disabled_rules:
            - trailing_whitespace
          opt_in_rules:
            - empty_count
            - empty_string
          excluded:
            - Pods
            - .build
          line_length: 120
          EOF
          fi

      - name: SwiftFormat
        run: |
          if [ -f .swiftformat ]; then
            swiftformat . --lint
          else
            echo "No .swiftformat config found, skipping SwiftFormat"
          fi

      - name: SwiftLint
        run: swiftlint --strict

  build-ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (if available)
        run: |
          if [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s "/Applications/Xcode_16.0.app/Contents/Developer"
          elif [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s "/Applications/Xcode_15.4.app/Contents/Developer"
          else
            echo "Using default Xcode installation"
            xcode-select -p
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build iOS app (compile only, no signing)
        run: |
          xcodebuild \
            -project Phonepedia.xcodeproj \
            -scheme "Phonepedia (2023)" \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty && exit ${PIPESTATUS[0]}

  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16 (if available)
        run: |
          if [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s "/Applications/Xcode_16.0.app/Contents/Developer"
          elif [ -d "/Applications/Xcode_15.4.app" ]; then
            sudo xcode-select -s "/Applications/Xcode_15.4.app/Contents/Developer"
          else
            echo "Using default Xcode installation"
            xcode-select -p
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build macOS app (compile only, no signing)
        run: |
          xcodebuild \
            -project Phonepedia.xcodeproj \
            -scheme "Phonepedia (2023)" \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            build | xcpretty && exit ${PIPESTATUS[0]}
